<aside class="sidebar" [class.sidebar--collapsed]="isCollapsed">
    <div class="sidebar-toggle-row">
        <button
            type="button"
            class="sidebar-toggle"
            [attr.aria-label]="isCollapsed ? 'Menü kinyitása' : 'Menü összecsukása'"
            [attr.aria-expanded]="!isCollapsed"
            [attr.data-tooltip]="isCollapsed ? 'Menü kinyitása' : null"
            (click)="toggleSidebar()"
        >
            <i class="bi" [class.bi-list]="isCollapsed" [class.bi-x-lg]="!isCollapsed"></i>
        </button>
    </div>

    <a
        class="sidebar-header"
        routerLink="/desk-booking"
        routerLinkActive="active"
        data-tooltip="Helyfoglalás"
    >
        <img src="/images/phoenix-logo.png" alt="" class="navbar-logo" />
    </a>

    <nav class="sidebar-nav">
        <a
            class="nav-link"
            routerLink="/calendar"
            routerLinkActive="active"
            data-tooltip="Naptár"
            *ngIf="isLoggedIn"
        >
            <i class="bi bi-calendar"></i>
            <span class="link-text">Naptár</span>
        </a>

        <a
            class="nav-link"
            routerLink="/my-absence-requests"
            routerLinkActive="active"
            data-tooltip="Saját kérelmek"
            *ngIf="isLoggedIn"
        >
            <i class="bi bi-calendar-check"></i>
            <span class="link-text">Saját kérelmek</span>
        </a>

        <a
            class="nav-link"
            routerLink="/absence-approvals"
            routerLinkActive="active"
            data-tooltip="Jóváhagyások"
        >
            <i class="bi bi-check2-square"></i>
            <span class="link-text">Jóváhagyások</span>
        </a>

        <a
            class="nav-link"
            routerLink="/desk-booking"
            routerLinkActive="active"
            data-tooltip="Helyfoglalás"
        >
            <i class="bi bi-grid-3x2-gap"></i>
            <span class="link-text">Helyfoglalás</span>
        </a>
    </nav>

    <div class="sidebar-footer">
        <div class="auth-transition" *ngIf="isAuthTransition">
            <span class="auth-spinner"></span>
            <span class="auth-label">{{ authTransitionLabel }}</span>
        </div>

        <ng-container *ngIf="!isAuthTransition">
            <ng-container *ngIf="isLoggedIn && userProfile; else loggedOutBlock">
                <a
                    class="sidebar-user"
                    routerLink="/profile"
                    routerLinkActive="active"
                    [attr.data-tooltip]="userProfile.displayName"
                >
                    <div class="avatar">
                        {{ getInitials(userProfile.displayName) }}
                    </div>

                    <div class="user-meta">
                        <div class="user-name">{{ userProfile.displayName }}</div>
                        <div class="user-dept">
                            {{ userProfile.department || userProfile.email || 'Bejelentkezett felhasználó' }}
                        </div>
                    </div>
                </a>

                <button
                    type="button"
                    class="logout-button"
                    data-tooltip="Kijelentkezés"
                    (click)="logout()"
                >
                    <i class="bi bi-box-arrow-right"></i>
                    <span class="link-text">Kijelentkezés</span>
                </button>
            </ng-container>
        </ng-container>
    </div>

    <ng-template #loggedOutBlock>
        <a
            routerLink="/login"
            class="login-button"
            data-tooltip="Bejelentkezés"
        >
            <i class="bi bi-box-arrow-in-right"></i>
            <span class="link-text">Bejelentkezés</span>
        </a>
    </ng-template>
</aside>
