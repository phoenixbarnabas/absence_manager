<aside class="sidebar d-flex flex-column">
    <a class="sidebar-header mb-4 py-3" routerLink="/desk-booking" routerLinkActive="active">
        <img src="/images/phoenix-logo.png" alt="" class="navbar-logo" />
    </a>

    <nav class="sidebar-nav nav flex-column gap-1 px-3">
        <a class="nav-link d-flex align-items-center gap-2" routerLink="/profile" routerLinkActive="active"
            *ngIf="isLoggedIn">
            <i class="bi bi-person"></i>
            <span>Profil</span>
        </a>



        <a class="nav-link d-flex align-items-center gap-2" routerLink="/calendar" routerLinkActive="active"
            *ngIf="isLoggedIn">
            <i class="bi bi-calendar"></i>
            <span>Naptár</span>
        </a>

        <a class="nav-link d-flex align-items-center gap-2" routerLink="/my-absence-requests" routerLinkActive="active"
            *ngIf="isLoggedIn">
            <i class="bi bi-calendar-check"></i>
            <span>Saját kérelmek</span>
        </a>

        <a routerLink="/absence-approvals" routerLinkActive="active" class="nav-link">
            <i class="bi bi-check2-square"></i>
            <span> Jóváhagyások</span>
        </a>

        <a class="nav-link d-flex align-items-center gap-2" routerLink="/desk-booking" routerLinkActive="active">
            <i class="bi bi-grid-3x2-gap"></i>
            <span>Helyfoglalás</span>
        </a>
    </nav>

    <div class="mt-auto"></div>

    <div class="px-3 mb-3">
        <div class="auth-transition pt-3 mt-3 border-top" *ngIf="isAuthTransition">
            <span class="auth-spinner"></span>
            <span>{{ authTransitionLabel }}</span>
        </div>

        <ng-container *ngIf="!isAuthTransition">
            <a class="sidebar-user pt-3 mt-3 mb-1 border-top text-decoration-none d-block" routerLink="/profile"
                routerLinkActive="active" *ngIf="isLoggedIn && userProfile; else loggedOutBlock">
                <div class="d-flex align-items-center gap-2">
                    <div class="avatar">
                        {{ getInitials(userProfile.displayName) }}
                    </div>

                    <div class="user-meta">
                        <div class="user-name">{{ userProfile.displayName }}</div>
                        <div class="user-dept">
                            {{ userProfile.department || userProfile.email || 'Bejelentkezett felhasználó' }}
                        </div>
                    </div>
                </div>
            </a>
        </ng-container>
    </div>

    <ng-template #loggedOutBlock>
        <div class="pt-3 mt-3 border-top">
            <a routerLink="/login" class="btn btn-primary w-100">
                Bejelentkezés
            </a>
        </div>
    </ng-template>
</aside>
