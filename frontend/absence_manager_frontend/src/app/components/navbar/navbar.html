    <nav class="sidebar-nav nav flex-column gap-1 px-3">

        <a class="nav-link d-flex align-items-center gap-2" routerLink="/desk-booking" routerLinkActive="active">

            <span>Helyfoglalás</span>

    <div class="mt-auto"></div>

    <a
        class="sidebar-user pt-3 mt-3 border-top mb-3 px-3 text-decoration-none"
        routerLink="/profile"
        routerLinkActive="active"
        *ngIf="userProfile"
    >
        <div class="d-flex align-items-center gap-2">
