<div class="login-page">
  <div class="container min-vh-100 d-flex align-items-center justify-content-center">
    <div class="row justify-content-center w-100">
      <div class="col-12 col-sm-10 col-md-8 col-lg-5 col-xl-4">

        <div class="card shadow login-card border-0">
          <div class="card-body text-center p-4 p-md-5">
            <img
              src="/images/phoenix-logo.png"
              alt="Phoenix logo"
              class="login-logo mb-4"
            />

            <h1 class="login-title mb-2">Login</h1>

            <p class="login-subtitle text-muted mb-4">
              Sign in with your Microsoft account to continue.
            </p>

            <button
              class="btn btn-primary w-100 login-button"
              type="button"
              (click)="login()"
              [disabled]="entraLoading"
            >
              <span *ngIf="!entraLoading">Login with Microsoft</span>
              <span *ngIf="entraLoading">Signing in...</span>
            </button>

            <div class="alert alert-danger mt-4 mb-0 text-start" *ngIf="entraError">
              <h6 class="mb-2">Bejelentkezési hiba</h6>
              <p class="mb-0">{{ entraError }}</p>
            </div>
          </div>
        </div>

      </div>
    </div>
  </div>
</div>
