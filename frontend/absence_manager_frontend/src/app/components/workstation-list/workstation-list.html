<div class="booking-card workstation-section">
    <div class="section-header">
        <h3 class="section-title mb-0">Munkaállomások</h3>
    </div>

    <div class="empty-state" *ngIf="workstations.length === 0">
        Nincs megjeleníthető munkaállomás.
    </div>

    <div class="workstation-grid" *ngIf="workstations.length > 0">
        <button type="button" class="workstation-tile" *ngFor="let workstation of workstations"
            [disabled]="!isSelectable(workstation)"
            [class.workstation-tile--selected]="selectedWorkstationId === workstation.workstationId"
            [class.workstation-tile--booked]="workstation.isBooked && !workstation.isBookedByCurrentUser"
            [class.workstation-tile--mine]="workstation.isBookedByCurrentUser"
            (click)="selectWorkstation(workstation.workstationId)">
            <i class="bi bi-pc-display"></i>

            <div class="workstation-name">
                {{ workstation.workstationName }}
            </div>

            <div class="workstation-code">
                {{ workstation.workstationCode }}
            </div>

            <small class="workstation-status" *ngIf="!workstation.isBooked">
                Szabad
            </small>

            <small class="workstation-status" *ngIf="workstation.isBookedByCurrentUser">
                A te foglalásod
            </small>

            <small class="workstation-status" *ngIf="workstation.isBooked && !workstation.isBookedByCurrentUser">
                Foglalt — {{ workstation.bookedByDisplayName || workstation.bookedByUserName || 'Ismeretlen' }}
            </small>
        </button>
    </div>

    <div class="desk-legend" *ngIf="workstations.length > 0">
        <div class="desk-legend__item">
            <span class="desk-legend__color desk-legend__color--free"></span>
            <span>Szabad</span>
        </div>

        <div class="desk-legend__item">
            <span class="desk-legend__color desk-legend__color--mine"></span>
            <span>Kiválasztva / általad foglalva</span>
        </div>

        <div class="desk-legend__item">
            <span class="desk-legend__color desk-legend__color--booked"></span>
            <span>Más által foglalva</span>
        </div>
    </div>
</div>
