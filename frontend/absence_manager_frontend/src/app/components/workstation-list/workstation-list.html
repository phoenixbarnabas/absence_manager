<div class="booking-card">
    <h3>Munkaállomások</h3>

    <div *ngIf="workstations.length === 0">
        Nincs megjeleníthető munkaállomás.
    </div>

    <div class="workstation-grid" *ngIf="workstations.length > 0">
        <button type="button" class="workstation-card" *ngFor="let workstation of workstations"
            [disabled]="!isSelectable(workstation)"
            [class.workstation-card--selected]="selectedWorkstationId === workstation.workstationId"
            [class.workstation-card--booked]="workstation.isBooked && !workstation.isBookedByCurrentUser"
            [class.workstation-card--mine]="workstation.isBookedByCurrentUser" (click)="selectWorkstation(workstation.workstationId)">
            <div>{{ workstation.workstationCode }}</div>
            <div>{{ workstation.workstationName }}</div>

            <small *ngIf="!workstation.isBooked">Szabad</small>
            <small *ngIf="workstation.isBookedByCurrentUser">A te foglalásod</small>
            <small *ngIf="workstation.isBooked && !workstation.isBookedByCurrentUser">
                Foglalt
            </small>
        </button>
    </div>
</div>
