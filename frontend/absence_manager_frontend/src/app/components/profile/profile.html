<div class="profile-container" *ngIf="!loading">
  <!-- Header -->
  <div class="profile-header">
    <h1 class="profile-title">Profilom</h1>
    <button class="settings-btn" (click)="openSettings()">
      <span class="settings-icon">⚙️</span>
      Beállítások
    </button>
  </div>

  <!-- User Info Card -->
  <div class="user-card" *ngIf="userProfile">
    <div class="user-avatar">{{ getInitials(userProfile.displayName) }}</div>
    <div class="user-info">
      <h2 class="user-name">{{ userProfile.displayName }}</h2>
      <p class="user-email">{{ userProfile.email }}</p>
      <div class="user-badges">
        <span class="badge">{{ userProfile.department }}</span>
        <span class="badge">{{ userProfile.jobTitle }}</span>
      </div>
    </div>
  </div>


  <!-- Additional Data Section -->
  <div class="additional-data-card" *ngIf="userProfile">
    <h3 class="section-title">További Adatok</h3>

    <div class="data-row">
      <p class="data-label">Osztály</p>
      <p class="data-value">{{ userProfile.department }}</p>
    </div>
    <div class="data-row">
      <p class="data-label">Szervezet</p>
      <p class="data-value">{{ userProfile.jobTitle }}</p>
    </div>
  </div>

  <!-- Error State -->
  <div class="error-message" *ngIf="error">
    <p>{{ error }}</p>
  </div>
</div>

<!-- Loading State -->
<div class="loading-container" *ngIf="loading">
  <p>Betöltés...</p>
</div>
