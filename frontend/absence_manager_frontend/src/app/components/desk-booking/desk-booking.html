<div class="desk-booking-page">
  <div class="page-header">
    <h1 class="page-title d-flex align-items-center gap-2">
      <i class="bi bi-grid-3x2-gap"></i>
      <span>Helyfoglalás</span>
    </h1>
  </div>

  <div class="booking-card">
    <div class="calendar-scroll">
      <div class="calendar-row">
        <button type="button" class="calendar-day" *ngFor="let day of calendarDays"
          [class.calendar-day--selected]="day.isSelected" [class.calendar-day--weekend]="day.isWeekend"
          [class.calendar-day--holiday]="day.isHoliday" [title]="day.holidayName || ''" (click)="selectDay(day)">
          <span class="day-label">{{ day.dayLabel }}</span>
          <strong class="day-number">{{ day.dayNumber }}</strong>
        </button>
      </div>
    </div>
  </div>

  <div class="booking-card">
    <div class="form-row-inline">
      <div class="form-field">
        <label for="locationSelect" class="form-label">Telephelyek</label>
        <select id="locationSelect" class="form-select" [(ngModel)]="selectedLocationId"
          (ngModelChange)="onLocationChange($event)">
          <option value="">Válassz telephelyet</option>
          <option *ngFor="let location of (locations$ | async)" [value]="location.id">
            {{ location.name }}
          </option>
        </select>
      </div>

      <div class="form-field">
        <label for="officeSelect" class="form-label">Irodák</label>
        <select id="officeSelect" class="form-select" [(ngModel)]="selectedOfficeId"
          (ngModelChange)="onOfficeChange($event)">
          <option value="">Válassz irodát</option>
          <option *ngFor="let office of (offices$ | async)" [value]="office.id">
            {{ office.name }}
          </option>
        </select>
      </div>
    </div>
  </div>

  <ng-container *ngIf="availability$ | async as availability">
    <div class="booking-card">
      <div class="workstation-navigation" *ngIf="availability$ | async as availability">
        <button *ngIf="!isFirstBookableDay" type="button" class="day-nav-button day-nav-button--left"
          aria-label="Előző nap" (click)="goToPreviousDay()">
          <i class="bi bi-chevron-left"></i>
        </button>

        <div class="day-nav-placeholder" *ngIf="isFirstBookableDay"></div>

        <div class="workstation-content">

          <div class="workstation-date-inline">
            <span>{{ selectedDate | date:'yyyy. MM. dd.' }}</span>
            <span class="separator">–</span>
            <span [class.non-working]="isSelectedDateNonWorkingDay()">
              {{ getSelectedDateLabel() }}
            </span>
          </div>

          <app-workstation-list [workstations]="availability?.workstations ?? []"
            [selectedWorkstationId]="selectedWorkstationId"
            [currentUserHasBooking]="availability?.currentUserHasBooking ?? false"
            (workstationSelected)="onWorkstationSelected($event, availability)">
          </app-workstation-list>
        </div>

        <button *ngIf="!isLastBookableDay" type="button" class="day-nav-button day-nav-button--right"
          aria-label="Következő nap" (click)="goToNextDay()">
          <i class="bi bi-chevron-right"></i>
        </button>

        <div class="day-nav-placeholder" *ngIf="isLastBookableDay"></div>
      </div>
    </div>

    <div class="booking-card booking-actions-card">
      <div class="booking-actions-row">
        <button *ngIf="!currentBookingId" type="button" class="btn booking-btn booking-btn--primary"
          [disabled]="!selectedWorkstationId || isSubmittingBooking || !!currentBookingId" (click)="submitBooking()">
          <i class="bi bi-check2-circle"></i>
          <span *ngIf="!isSubmittingBooking">Foglalás mentése</span>
          <span *ngIf="isSubmittingBooking">Mentés...</span>
        </button>

        <button type="button" class="btn booking-btn booking-btn--danger" *ngIf="currentBookingId"
          [disabled]="isSubmittingBooking" (click)="cancelBooking()">
          <i class="bi bi-x-circle"></i>
          <span>Foglalás lemondása</span>
        </button>
      </div>
    </div>
  </ng-container>

  <div class="feedback-messages">
    <div class="alert alert-danger" *ngIf="errorMessage">
      {{ errorMessage }}
    </div>

    <div class="alert alert-success" *ngIf="successMessage">
      {{ successMessage }}
    </div>
  </div>
</div>
